# ============================================================
# Agent Knowledge Platform - Docker Compose
# ============================================================
version: "3.9"

services:
  # --- FastAPI Application ---
  app:
    build: .
    container_name: agent-api
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./agents_config:/app/agents_config:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-agent_platform}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Qdrant (Vector Database) ---
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: agent-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    networks:
      - agent-network

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: agent-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - agent-network

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  agent-network:
    driver: bridge
